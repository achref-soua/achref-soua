name: Update profile card

on:
  workflow_dispatch:
  schedule:
    # GitHub cron has no native "every two weeks"; run weekly and gate on even ISO weeks.
    - cron: "17 6 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check biweekly schedule
        id: schedule
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          week="$(date -u +%V)"
          if [ $((10#$week % 2)) -eq 0 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.schedule.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.schedule.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh profile card
        if: steps.schedule.outputs.run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-profile-card.mjs
